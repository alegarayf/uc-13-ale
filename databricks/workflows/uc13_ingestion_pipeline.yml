# UC13 Ingestion Pipeline — Databricks Asset Bundle workflow definition
#
# Deploy with:
#   databricks bundle deploy --target <env>
#   databricks bundle run uc13_ingestion_pipeline --target <env>
#
# Or import via the Databricks UI:
#   Workflows → Create Job → Import from YAML
#
# Required before first run:
#   - Unity Catalog catalog "uc13" created by workspace admin
#   - Secrets scope "uc13" with keys listed in workflows/README.md
#   - Run 00_setup_vector_search once to create the VS endpoint and index

resources:
  jobs:
    uc13_ingestion_pipeline:
      name: "UC13 Ingestion Pipeline"
      description: >
        Phase 1 (SharePoint download + Priority Tier detection) →
        Phase 2 (Document Classifier + Ingestion Parser + Company Profiler) →
        Phase 3 (Business Model · Financial Trends · Customer Quality · KPI ·
        Legal Contracts · Quality of Earnings agents — all writing to uc13.analysis).
        Set sp_company_name to switch between companies without code changes.

      # Job-level parameters — visible in the Workflow UI Run Now dialog.
      parameters:
        - name: sp_company_name
          default: ""
          description: >
            Company name as it appears in SharePoint under "Example Data Room/".
            E.g. "Elder Care" or "Project Silo". Required — leave blank to abort.
        - name: catalog
          default: "uc13"
          description: "Unity Catalog catalog name."
        - name: schema
          default: "ingestion"
          description: "UC schema for raw tables (chunks, embeddings, upload_log)."
        - name: embedding_endpoint
          default: "databricks-bge-large-en"
          description: "MLflow embedding endpoint name."
        - name: llm_endpoint
          default: "databricks-meta-llama-3-3-70b-instruct"
          description: "MLflow LLM endpoint name."
        - name: vs_endpoint_name
          default: "uc13-vector-search"
          description: "Databricks Vector Search endpoint name."

      tasks:
        # ------------------------------------------------------------------
        # Task 0 — One-time environment setup
        # Run manually when provisioning a new workspace or rebuilding the
        # Vector Search index. In steady-state runs this task is skipped by
        # setting the run_if condition via the UI or by commenting it out.
        # ------------------------------------------------------------------
        - task_key: setup_vector_search
          description: >
            Create UC schemas, embeddings table, VS endpoint and VS index.
            Idempotent — safe to re-run; existing resources are left untouched.
          python_script_task:
            python_file: "databricks/jobs/scripts/00_setup_vector_search.py"
            parameters:
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.vs_endpoint_name}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 1 — Phase 1: Download from SharePoint → UC Volume
        # ------------------------------------------------------------------
        - task_key: download_upload
          description: >
            Connect to SharePoint, list and deduplicate files for the target
            company, download to scratch storage, upload to UC Volume, and
            write uc13.ingestion.upload_log with Priority Tier signals.
          depends_on:
            - task_key: setup_vector_search
          python_script_task:
            python_file: "databricks/jobs/scripts/01_download_upload.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 2 — Phase 2a: Document Classifier
        # Reads volume files; calls LLM to assign workstream tags and priority.
        # Must complete before Tasks 3 and 4 can start.
        # ------------------------------------------------------------------
        - task_key: document_classifier
          description: >
            LLM-based classification: assigns ARRAY<STRING> workstream tags
            (FINANCIAL, CUSTOMER, KPI_OPS, LEGAL, QUALITY_EARNINGS, FORECAST,
            BUSINESS_MODEL, BACKGROUND) and a BOOLEAN priority_tier to each file.
            Writes uc13.classification.doc_relevance.
          depends_on:
            - task_key: download_upload
          python_script_task:
            python_file: "databricks/jobs/scripts/02_document_classifier.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 3 — Phase 2b: Ingestion Parser
        # Runs after the classifier; priority-tier documents are parsed first.
        # Must complete before the Company Profiler can do semantic search.
        # ------------------------------------------------------------------
        - task_key: ingestion_parser
          description: >
            Parses should_parse=true files into semantic chunks, generates BGE
            Large embeddings, writes uc13.ingestion.chunks and
            uc13.ingestion.embeddings (CDF enabled, workstream + priority_tier).
          depends_on:
            - task_key: document_classifier
          python_script_task:
            python_file: "databricks/jobs/scripts/03_ingestion_parser.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.embedding_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 4 — Phase 2b: Company Profiler
        # Runs after the parser so the vector index is populated.
        # ------------------------------------------------------------------
        - task_key: company_profiler
          description: >
            Semantic search over embeddings + LLM extraction to build a
            structured company profile. Writes uc13.classification.company_profile.
            company_name always comes from sp_company_name — never from LLM output.
          depends_on:
            - task_key: ingestion_parser
          python_script_task:
            python_file: "databricks/jobs/scripts/04_company_profiler.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.embedding_endpoint}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 5 — Phase 3a: Business Model Agent
        # Runs after company_profiler; extracts revenue model + durability
        # rating from BUSINESS_MODEL-tagged documents.
        # ------------------------------------------------------------------
        - task_key: business_model_agent
          description: >
            Semantic retrieval over BUSINESS_MODEL chunks + single LLM call to
            extract revenue model tag, products/services, sales motion, and
            revenue visibility. Applies deterministic revenue durability flag
            (Green/Yellow/Red) and overlay conflict check.
            Writes uc13.analysis.business_model.
          depends_on:
            - task_key: company_profiler
          spark_python_task:
            python_file: "databricks/agents/workstreams/business_model_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 6 — Phase 3b: Financial Trends Agent
        # Runs after company_profiler; extracts financial metrics and applies
        # Austin Hough's investment thresholds. Runs in parallel with Task 5.
        # ------------------------------------------------------------------
        - task_key: financial_trends_agent
          description: >
            Semantic retrieval over FINANCIAL and QUALITY_EARNINGS chunks +
            single LLM call to extract revenue trend, gross margin, EBITDA,
            addback schedule, working capital, and budget vs. actual.
            Applies tech and healthcare services thresholds deterministically.
            Writes uc13.analysis.financial_trends.
          depends_on:
            - task_key: company_profiler
          spark_python_task:
            python_file: "databricks/agents/workstreams/financial_trends_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 7 — Phase 3c: Customer Quality Agent
        # Extracts customer concentration, retention, and payor mix.
        # Generates contract_trigger_list for Legal Contracts Agent.
        # Runs in parallel with Tasks 5 and 6 after company_profiler.
        # ------------------------------------------------------------------
        - task_key: customer_quality_agent
          description: >
            Semantic retrieval over CUSTOMER-tagged chunks + single LLM call to
            extract top customer concentration, NRR/GRR, payor mix, and account
            size. Applies tech and healthcare services concentration thresholds.
            Generates contract_trigger_list for customers >20% of revenue.
            Writes uc13.analysis.customer_quality.
          depends_on:
            - task_key: company_profiler
          spark_python_task:
            python_file: "databricks/agents/workstreams/customer_quality_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 8 — Phase 3d: KPI Agent
        # Extracts overlay-specific operational KPIs.
        # Runs in parallel with Tasks 5, 6, 7 after company_profiler.
        # ------------------------------------------------------------------
        - task_key: kpi_agent
          description: >
            Semantic retrieval over KPI_OPS-tagged chunks + single LLM call to
            extract the overlay-specific KPI set (tech: utilization, bill rates,
            contractor %; healthcare: census, turnover, compliance incidents).
            Missing expected KPIs are returned as management questions.
            Writes uc13.analysis.kpi.
          depends_on:
            - task_key: company_profiler
          spark_python_task:
            python_file: "databricks/agents/workstreams/kpi_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 9 — Phase 3e: Legal Contracts Agent
        # Extracts contract terms and litigation from LEGAL-tagged documents.
        # Depends on customer_quality_agent for contract review triggers.
        # ------------------------------------------------------------------
        - task_key: legal_contracts_agent
          description: >
            Reads contract_trigger_list from uc13.analysis.customer_quality.
            Semantic retrieval over LEGAL-tagged chunks + single LLM call to
            extract contract register (CoC clauses, termination, anti-assignment,
            auto-renewal, pricing, liability caps, restrictive covenants) and
            litigation register. Produces CoC consent list for deal team.
            Writes uc13.analysis.legal_contracts.
          depends_on:
            - task_key: customer_quality_agent
          spark_python_task:
            python_file: "databricks/agents/workstreams/legal_contracts_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 10 — Phase 3f: Quality of Earnings Agent
        # Applies four-tier addback classification framework.
        # Depends on financial_trends_agent for the addback passthrough.
        # ------------------------------------------------------------------
        - task_key: quality_of_earnings_agent
          description: >
            Reads addback_schedule_json from uc13.analysis.financial_trends.
            Semantic retrieval over QUALITY_EARNINGS-tagged chunks + single LLM
            call to classify each addback (Tier 1–4), detect revenue quality
            flags (DSO, period-end spikes, policy changes), and produce
            pre-QofE scope items for the accounting provider.
            Computes three adjusted EBITDA scenarios deterministically.
            Writes uc13.analysis.quality_of_earnings.
          depends_on:
            - task_key: financial_trends_agent
          spark_python_task:
            python_file: "databricks/agents/workstreams/quality_of_earnings_agent.py"
            parameters:
              - "{{job.parameters.sp_company_name}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.llm_endpoint}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            data_security_mode: "SINGLE_USER"
            runtime_engine: "STANDARD"
          timeout_seconds: 7200
          max_retries: 1
          retry_on_timeout: true

      # Notify on failure (configure email or webhook in workspace settings).
      email_notifications:
        on_failure: []

      # Maximum concurrent runs — process one company at a time.
      max_concurrent_runs: 1
